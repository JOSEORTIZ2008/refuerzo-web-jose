<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="text-center p-3">
        <h1>Contacto</h1>
        
        <div class="dropdown mt-3">
            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                Menú
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="index.html">Inicio</a></li>
                <li><a class="dropdown-item" href="contact.html">Contacto</a></li>
            </ul>
        </div>
    </header>

    <main class="container mt-5">
        <section class="mb-4">
            <h2>Formulario de contacto</h2>
            <p>Puedes enviarnos un mensaje utilizando el siguiente formulario.</p>

            <form>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Ingresa tu nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" placeholder="Ingresa tu correo">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea class="form-control" rows="5" placeholder="Escribe tu mensaje"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Enviar mensaje</button>
            </form>
        </section>
    </main>

    <footer class="text-center p-3">
        <p>&copy; 2026 Mi Página Web</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
